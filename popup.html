<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Clozemaster Native Helper</title>
    <style>
      body {
        box-sizing: border-box;
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #172026;
        background: #ffffff;
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 18px;
        font-weight: 650;
      }

      label {
        display: block;
        margin-top: 12px;
        font-size: 13px;
        font-weight: 550;
      }

      input,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        padding: 8px 10px;
        border: 1px solid #cfd8dc;
        border-radius: 6px;
        font: inherit;
      }

      button {
        margin-top: 16px;
        border-color: #1d4ed8;
        color: #ffffff;
        background: #1d4ed8;
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }

      #status {
        min-height: 20px;
        margin-top: 10px;
        color: #166534;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Clozemaster Native Helper</h1>

    <label>
      Translation provider
      <select id="translationProvider">
        <option value="google">Google Cloud Translation</option>
        <option value="deepl">DeepL</option>
      </select>
    </label>

    <label>
      Google Cloud Translation API Key
      <input id="googleApiKey" type="password" placeholder="AIza..." autocomplete="off" />
    </label>

    <label>
      DeepL API Key
      <input id="deeplApiKey" type="password" placeholder="...:fx" autocomplete="off" />
    </label>

    <label>
      Target language
      <select id="targetLanguage">
        <option value="ko">Korean</option>
        <option value="ja">Japanese</option>
        <option value="zh">Chinese</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="pt">Portuguese</option>
        <option value="vi">Vietnamese</option>
        <option value="th">Thai</option>
      </select>
    </label>

    <label>
      Explanation translation display
      <select id="explanationTranslationDisplayMode">
        <option value="replace">Replace Explanation dialog</option>
        <option value="separate">Show in separate dialog</option>
      </select>
    </label>

    <button id="save" type="button">Save</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script type="module" src="/src/popup/popup.ts"></script>
  </body>
</html>
